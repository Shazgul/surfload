parallelism: 3
chunk_size: 1048576
timeout: 120
retries: 3
resume_on_retry: true
backoff_base_seconds: 1
backoff_max_seconds: 60
compression: none
credential_backend: file
log_level: INFO

host_defaults:
  fileio:
    upload_url: https://file.io
    max_downloads: 0
    auto_delete: false
    expires: ""

  catbox:
    upload_url: https://catbox.moe/user/api.php

  tmpfiles_org:
    upload_url: https://tmpfiles.org/api/v1/upload

  transfer_sh:
    upload_url: https://transfer.sh
    max_days: 14
    max_downloads: 0
    enable_resume: false

  buzzheavier:
    upload_base_url: https://w.buzzheavier.com
    parent_id: ""
    location_id: ""
    note: ""
    enable_resume: false

  onefichier:
    upload_url: ""
    upload_server_url: https://api.1fichier.com/v1/upload/get_upload_server.cgi

  gofile:
    upload_url: ""
    server_api_url: https://api.gofile.io/getServer
    upload_path: /uploadFile
    folder_id: ""
    use_bearer_auth: false
    enable_resume: false
    resume_probe_url_template: ""

  send_now:
    upload_url: https://api.send.now/upload
    file_field: file
    token_field: ""
    use_bearer_auth: true

  upload_ee:
    upload_url: https://upload.ee/upload_api.php
    file_field: file
    token_field: token
    use_bearer_auth: false

  vikingfile:
    upload_url: ""
    server_api_url: https://vikingfile.com/api/get-server
    file_field: file
    user_field: user
    use_bearer_auth: false

# Optional host-specific override block:
# hosts:
#   transfer_sh:
#     max_days: 7
